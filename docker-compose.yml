services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${SPRING_DATASOUCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOUCE_PASSWORD}
      POSTGRES_DB: ${SPRING_DATASOUCE_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    
      